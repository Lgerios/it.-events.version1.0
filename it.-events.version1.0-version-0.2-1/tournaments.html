<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT_Moskow - Турниры</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Font Awesome для иконок игр (можно заменить на реальные логотипы) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <img src="it_mos_new_logo.jpg" alt="Логотип IT Москва" class="logo">
        <nav class="btn">
            <ul>
                <li><a href="index.html" id="events-link">События</a></li>
                <li><a href="tournaments.html" id="tournaments-link" class="active">Турниры</a></li>
                <li><a href="#" id="rating-link">Рейтинг</a></li>
            </ul>
        </nav>
        <div class="header-right">
            <div class="greeting" id="greeting"></div>
            <div id="auth-section" class="auth-section"></div>
        </div>
    </header>
    <main>
        <h1 class="cyber_arena fade-in">Кибер турниры</h1>

        <!-- Контейнер для карточек турниров -->
        <div id="tournaments-container" class="tournaments-content fade-in"></div>

        <!-- Панель управления для админа (скрыта) -->
        <div id="admin-panel" class="admin-panel" style="display: none;">
            <h3>Управление турнирами</h3>
            <div id="tournaments-editor"></div>
            <button id="add-tournament-btn">➕ Добавить турнир</button>
            <button id="save-tournaments-btn" class="save-btn">💾 Сохранить изменения</button>
            <button id="close-admin-btn">✖ Закрыть</button>
        </div>
    </main>

    <!-- Модальные окна -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" data-modal="login">&times;</span>
            <h2>Вход</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button type="submit" class="modal-btn">Войти</button>
            </form>
            <p class="modal-switch">Нет аккаунта? <a href="#" id="switch-to-register">Зарегистрироваться</a></p>
        </div>
    </div>

    <div id="register-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" data-modal="register">&times;</span>
            <h2>Регистрация</h2>
            <form id="register-form">
                <input type="text" id="register-name" placeholder="Имя" required>
                <input type="email" id="register-email" placeholder="Email" required>
                <input type="password" id="register-password" placeholder="Пароль" required>
                <button type="submit" class="modal-btn">Зарегистрироваться</button>
            </form>
            <p class="modal-switch">Уже есть аккаунт? <a href="#" id="switch-to-login">Войти</a></p>
        </div>
    </div>

    <script>
        // ==================== ПОЛЬЗОВАТЕЛИ ====================
        if (!localStorage.getItem('users')) {
            const defaultUsers = [
                { id: '1', name: 'Александр', email: 'alexander@example.com', password: 'admin123', role: 'admin', avatar: 'account_circle' }
            ];
            localStorage.setItem('users', JSON.stringify(defaultUsers));
        }

        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;

        // ==================== ТУРНИРЫ ====================
        const defaultTournaments = [
            { id: '1', game: 'cs2', date: '15-16 марта 2026', title: 'Кубок IT.Moscow по CS2', desc: 'Командный турнир. Призовой фонд 50 000 ₽. Регистрация до 10 марта.', meta: 'Discipline: CS2 | Формат: 5x5 | Участвуют: 16 команд' },
            { id: '2', game: 'dota2', date: '22-23 марта 2026', title: 'Dota 2 Open Cup', desc: 'Открытый турнир для студентов. Призовой фонд 30 000 ₽.', meta: 'Discipline: Dota 2 | Формат: 5x5 | Участвуют: 12 команд' },
            { id: '3', game: 'valorant', date: '5 апреля 2026', title: 'Valorant: Битва районов', desc: 'Сражение между факультетами. Призы и кубки.', meta: 'Discipline: Valorant | Формат: 5x5 | Участвуют: 8 команд' },
            { id: '4', game: 'mlbb', date: '12 апреля 2026', title: 'MLBB: Mobile Mayhem', desc: 'Турнир по Mobile Legends. Призовой фонд 20 000 ₽.', meta: 'Discipline: MLBB | Формат: 5x5 | Участвуют: 10 команд' }
        ];

        if (!localStorage.getItem('tournaments')) {
            localStorage.setItem('tournaments', JSON.stringify(defaultTournaments));
        }

        let tournaments = JSON.parse(localStorage.getItem('tournaments'));

        // Соответствие игры и иконки (можно заменить на реальные логотипы-картинки)
        const gameIcons = {
        cs2: { type: 'img', src: 'images/cs2-logo.png', alt: 'CS2' },
        dota2: { type: 'img', src: 'images/dota2-logo.png', alt: 'Dota 2' },
        valorant: { type: 'img', src: 'images/valorant-logo.png', alt: 'Valorant' },
        mlbb: { type: 'img', src: 'images/mlbb-logo.png', alt: 'MLBB' },
        default: { type: 'img', src: 'images/default-trophy.png', alt: 'Турнир' }
};

        // ==================== ЭЛЕМЕНТЫ ====================
        const authSection = document.getElementById('auth-section');
        const greetingEl = document.getElementById('greeting');
        const container = document.getElementById('tournaments-container');
        const adminPanel = document.getElementById('admin-panel');
        const editorDiv = document.getElementById('tournaments-editor');
        const addBtn = document.getElementById('add-tournament-btn');
        const saveBtn = document.getElementById('save-tournaments-btn');
        const closeAdminBtn = document.getElementById('close-admin-btn');

        // ==================== ФУНКЦИИ ====================
        function renderTournaments() {
            container.innerHTML = '<h2>Ближайшие турниры</h2>';
            tournaments.forEach(t => {
            const gameStyle = gameIcons[t.game] || gameIcons.default;
            let iconHtml;
            if (gameStyle.type === 'img') {
                iconHtml = `<img src="${gameStyle.src}" alt="${gameStyle.alt}" style="width: 32px; height: 32px; margin-right: 10px;">`;
            } else {
                iconHtml = `<i class="${gameStyle.icon}" style="color: ${gameStyle.color}; font-size: 1.8rem; margin-right: 10px;"></i>`;
            }                
                const card = document.createElement('div');
                card.className = 'tournament-card';
                card.innerHTML = `
                    <div class="tournament-header">
                        <i class="${gameStyle.icon}" style="color: ${gameStyle.color}; font-size: 1.8rem; margin-right: 10px;"></i>
                        <div>
                            <div class="tournament-date">${t.date}</div>
                            <div class="tournament-title">${t.title}</div>
                        </div>
                    </div>
                    <div class="tournament-desc">${t.desc}</div>
                    <div class="tournament-meta">${t.meta}</div>
                `;
                container.appendChild(card);
            });

            // Если админ, показываем кнопку редактирования
            if (currentUser && currentUser.role === 'admin') {
                const adminBtn = document.createElement('button');
                adminBtn.id = 'edit-tournaments-btn';
                adminBtn.className = 'admin-edit-btn';
                adminBtn.textContent = '✎ Управление турнирами';
                adminBtn.addEventListener('click', () => {
                    renderEditor();
                    adminPanel.style.display = 'block';
                });
                container.appendChild(adminBtn);
            }
        }

        function renderEditor() {
            editorDiv.innerHTML = '';
            tournaments.forEach((t, index) => {
                const row = document.createElement('div');
                row.className = 'editor-row';
                row.innerHTML = `
                    <select class="tournament-game-select" data-index="${index}">
                        <option value="cs2" ${t.game === 'cs2' ? 'selected' : ''}>CS2</option>
                        <option value="dota2" ${t.game === 'dota2' ? 'selected' : ''}>Dota 2</option>
                        <option value="valorant" ${t.game === 'valorant' ? 'selected' : ''}>Valorant</option>
                        <option value="mlbb" ${t.game === 'mlbb' ? 'selected' : ''}>MLBB</option>
                        <option value="default" ${!t.game || t.game === 'default' ? 'selected' : ''}>Другая</option>
                    </select>
                    <input type="text" class="tournament-date-input" value="${t.date}" placeholder="Дата" data-index="${index}">
                    <input type="text" class="tournament-title-input" value="${t.title}" placeholder="Название" data-index="${index}">
                    <textarea class="tournament-desc-input" placeholder="Описание" data-index="${index}">${t.desc}</textarea>
                    <input type="text" class="tournament-meta-input" value="${t.meta}" placeholder="Мета-информация" data-index="${index}">
                    <button class="delete-tournament" data-index="${index}">✖</button>
                `;
                editorDiv.appendChild(row);
            });
        }

        function updateTournamentsFromEditor() {
            const gameSelects = document.querySelectorAll('.tournament-game-select');
            const dateInputs = document.querySelectorAll('.tournament-date-input');
            const titleInputs = document.querySelectorAll('.tournament-title-input');
            const descInputs = document.querySelectorAll('.tournament-desc-input');
            const metaInputs = document.querySelectorAll('.tournament-meta-input');
            tournaments = [];
            gameSelects.forEach((select, i) => {
                tournaments.push({
                    id: tournaments[i]?.id || Date.now() + i,
                    game: select.value,
                    date: dateInputs[i].value,
                    title: titleInputs[i].value,
                    desc: descInputs[i].value,
                    meta: metaInputs[i].value
                });
            });
        }

        function saveTournaments() {
            updateTournamentsFromEditor();
            localStorage.setItem('tournaments', JSON.stringify(tournaments));
            renderTournaments();
            adminPanel.style.display = 'none';
        }

        // ==================== АВТОРИЗАЦИЯ ====================
        function updateAuthUI() {
            if (currentUser) {
                authSection.innerHTML = `
                    <div class="user-profile">
                        <span class="user-name">${currentUser.name}</span>
                        <span class="material-icons user-avatar">${currentUser.avatar || 'account_circle'}</span>
                        <button id="logout-btn" class="logout-btn">Выйти</button>
                    </div>
                `;
                document.getElementById('logout-btn').addEventListener('click', logout);
            } else {
                authSection.innerHTML = `
                    <button id="login-btn" class="auth-btn">Вход</button>
                    <button id="register-btn" class="auth-btn register-btn">Регистрация</button>
                `;
                document.getElementById('login-btn').addEventListener('click', () => openModal('login'));
                document.getElementById('register-btn').addEventListener('click', () => openModal('register'));
            }
        }

        const loginModal = document.getElementById('login-modal');
        const registerModal = document.getElementById('register-modal');
        const closeButtons = document.querySelectorAll('.close-modal');
        const switchToRegister = document.getElementById('switch-to-register');
        const switchToLogin = document.getElementById('switch-to-login');

        function openModal(type) {
            if (type === 'login') loginModal.style.display = 'flex';
            else registerModal.style.display = 'flex';
        }

        function closeModals() {
            loginModal.style.display = 'none';
            registerModal.style.display = 'none';
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            updateAuthUI();
            renderTournaments(); // перерисуем, чтобы убрать кнопку админа
        }

        function registerUser(name, email, password) {
            const users = JSON.parse(localStorage.getItem('users'));
            if (users.find(u => u.email === email)) {
                alert('Пользователь с таким email уже существует');
                return false;
            }
            const newUser = {
                id: Date.now().toString(),
                name: name,
                email: email,
                password: password,
                role: 'user',
                avatar: 'account_circle'
            };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            currentUser = newUser;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            updateAuthUI();
            closeModals();
            renderTournaments();
            alert('Регистрация успешна!');
            return true;
        }

        function loginUser(email, password) {
            const users = JSON.parse(localStorage.getItem('users'));
            const user = users.find(u => u.email === email && u.password === password);
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateAuthUI();
                closeModals();
                renderTournaments();
                alert('Вход выполнен успешно!');
                return true;
            } else {
                alert('Неверный email или пароль');
                return false;
            }
        }

        function setGreeting() {
            const hour = new Date().getHours();
            if (hour < 12) greetingEl.textContent = 'Доброе утро!';
            else if (hour < 18) greetingEl.textContent = 'Добрый день!';
            else greetingEl.textContent = 'Добрый вечер!';
        }
        setGreeting();
        updateAuthUI();
        renderTournaments();

        // Обработчики модалок
        closeButtons.forEach(btn => btn.addEventListener('click', closeModals));
        window.addEventListener('click', (e) => { if (e.target.classList.contains('modal')) closeModals(); });

        if (switchToRegister) {
            switchToRegister.addEventListener('click', (e) => {
                e.preventDefault();
                closeModals();
                openModal('register');
            });
        }
        if (switchToLogin) {
            switchToLogin.addEventListener('click', (e) => {
                e.preventDefault();
                closeModals();
                openModal('login');
            });
        }

        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            registerUser(
                document.getElementById('register-name').value,
                document.getElementById('register-email').value,
                document.getElementById('register-password').value
            );
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            loginUser(
                document.getElementById('login-email').value,
                document.getElementById('login-password').value
            );
        });

        document.getElementById('rating-link').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Раздел «Рейтинг» в разработке. Скоро здесь будет интересно!');
        });

        // Админ-панель обработчики
        addBtn.addEventListener('click', () => {
            updateTournamentsFromEditor();
            tournaments.push({ id: Date.now().toString(), game: 'default', date: 'Новая дата', title: 'Новый турнир', desc: 'Описание', meta: 'Мета-информация' });
            renderEditor();
        });

        editorDiv.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-tournament')) {
                const index = e.target.getAttribute('data-index');
                updateTournamentsFromEditor();
                tournaments.splice(index, 1);
                renderEditor();
            }
        });

        saveBtn.addEventListener('click', saveTournaments);

        closeAdminBtn.addEventListener('click', () => {
            adminPanel.style.display = 'none';
        });
    </script>
</body>
</html>
